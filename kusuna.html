<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
}

header{
    background:#0077b6;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:20px auto;
}

.form-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 20px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#023e8a;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

table,th,td{
    border:1px solid #ccc;
}

th{
    background:#0077b6;
    color:white;
}

th,td{
    padding:10px;
    text-align:center;
}

.delete-btn{
    background:red;
}
</style>

</head>
<body>

<header>
<h1>Hospital Management System</h1>
<p>Mini Project</p>
</header>

<div class="container">

<div class="form-box">

<h2>Patient Registration</h2>

<input type="text" id="name" placeholder="Patient Name">

<input type="number" id="age" placeholder="Age">

<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="text" id="disease" placeholder="Disease">

<input type="text" id="doctor" placeholder="Doctor Name">

<button onclick="addPatient()">Register Patient</button>

</div>

<h2 style="margin-top:20px;">Patient Records</h2>

<table id="patientTable">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Disease</th>
<th>Doctor</th>
<th>Action</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script>

let patientID = 1;

function addPatient(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let gender=document.getElementById("gender").value;
let disease=document.getElementById("disease").value;
let doctor=document.getElementById("doctor").value;

if(name=="" || age=="" || disease=="" || doctor==""){
alert("Please fill all fields");
return;
}

let table=document.getElementById("patientTable").getElementsByTagName("tbody")[0];

let row=table.insertRow();

row.insertCell(0).innerHTML=patientID++;
row.insertCell(1).innerHTML=name;
row.insertCell(2).innerHTML=age;
row.insertCell(3).innerHTML=gender;
row.insertCell(4).innerHTML=disease;
row.insertCell(5).innerHTML=doctor;

let action=row.insertCell(6);

action.innerHTML='<button class="delete-btn" onclick="deleteRow(this)">Delete</button>';

document.getElementById("name").value="";
document.getElementById("age").value="";
document.getElementById("disease").value="";
document.getElementById("doctor").value="";

}

function deleteRow(btn){
let row=btn.parentNode.parentNode;
row.parentNode.removeChild(row);
}

</script>

</body>
</html>
